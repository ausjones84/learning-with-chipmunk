<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Learning with Chipmunk!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Comic Sans MS','Chalkboard SE',cursive;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}
/* Stars background */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{
  position:absolute;
  background:#fff;
  border-radius:50%;
  animation:twinkle var(--dur) ease-in-out infinite;
  opacity:0;
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(0.8)}
  50%{opacity:1;transform:scale(1.2)}
}
/* Main card */
.card{
  position:relative;
  z-index:10;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,0.15);
  border-radius:32px;
  padding:40px 32px 36px;
  max-width:480px;
  width:92%;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation:slideUp 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(60px) scale(0.9)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
/* Chipmunk */
.chipmunk{
  font-size:96px;
  display:block;
  animation:chipBounce 2s ease-in-out infinite;
  cursor:pointer;
  line-height:1;
  margin-bottom:12px;
  filter:drop-shadow(0 4px 20px rgba(255,200,50,0.6));
}
@keyframes chipBounce{
  0%,100%{transform:translateY(0) rotate(-3deg) scale(1)}
  50%{transform:translateY(-14px) rotate(3deg) scale(1.05)}
}
/* Title */
.title{
  font-size:clamp(26px,7vw,38px);
  font-weight:900;
  background:linear-gradient(90deg,#ffd700,#ff6b6b,#a855f7,#00d4ff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradShift 3s linear infinite;
  line-height:1.2;
  margin-bottom:6px;
}
@keyframes gradShift{
  0%{background-position:0%}
  100%{background-position:300%}
}
.subtitle{
  font-size:clamp(14px,4vw,18px);
  color:rgba(255,255,255,0.7);
  margin-bottom:28px;
  line-height:1.5;
}
/* Feature pills */
.features{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:28px;
}
.pill{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  padding:6px 14px;
  font-size:13px;
  color:#fff;
  display:flex;
  align-items:center;
  gap:5px;
}
/* Play button */
.play-btn{
  display:inline-block;
  background:linear-gradient(135deg,#f093fb,#f5576c);
  color:#fff;
  font-family:inherit;
  font-size:clamp(18px,5vw,24px);
  font-weight:900;
  padding:18px 48px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 8px 30px rgba(245,87,108,0.5);
  transition:transform 0.2s,box-shadow 0.2s;
  animation:pulse 2s ease-in-out infinite;
  letter-spacing:1px;
}
@keyframes pulse{
  0%,100%{transform:scale(1);box-shadow:0 8px 30px rgba(245,87,108,0.5)}
  50%{transform:scale(1.04);box-shadow:0 12px 40px rgba(245,87,108,0.7)}
}
.play-btn:hover{transform:scale(1.08)!important;box-shadow:0 16px 48px rgba(245,87,108,0.8)!important}
.play-btn:active{transform:scale(0.97)!important}
/* Age badge */
.age{font-size:12px;color:rgba(255,255,255,0.45);margin-top:18px;}
/* Floating emojis */
.floaters{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.floater{
  position:absolute;
  font-size:28px;
  animation:floatUp var(--fdur) linear infinite;
  opacity:0;
  bottom:-50px;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) rotate(0deg)}
  10%{opacity:0.7}
  90%{opacity:0.4}
  100%{opacity:0;transform:translateY(-110vh) rotate(360deg)}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="floaters" id="floaters"></div>
<div class="card">
  <span class="chipmunk" id="chip" onclick="chipSpeak()">&#x1F43F;&#xFE0F;</span>
  <div class="title">Learning with Chipmunk!</div>
  <div class="subtitle">A fun adventure in reading, math, history &amp; art &#x2728;</div>
  <div class="features">
    <span class="pill">&#x1F4DA; Reading &amp; Sounds</span>
    <span class="pill">&#x1F522; Fun Math</span>
    <span class="pill">&#x270A;&#x1F3FE; Black History</span>
    <span class="pill">&#x1F916; AI Literacy</span>
    <span class="pill">&#x1F3A8; Drawing</span>
    <span class="pill">&#x1F50A; Voice</span>
  </div>
  <a href="game.html" class="play-btn">&#x25B6;&#xFE0F; Let's Play!</a>
  <div class="age">Made with &#x2764;&#xFE0F; for curious kids ages 4&#x2013;8</div>
</div>
<script>
var synth=window.speechSynthesis;
var msgs=[
  'Hi! I am Chipmunk! Ready to learn?',
  'Come on in! Learning is so fun!',
  'I love learning with you!',
  'Tap the button and let''s go!',
  'You are going to do amazing!'
];
var mi=0;
function chipSpeak(){
  if(!synth)return;
  synth.cancel();
  var u=new SpeechSynthesisUtterance(msgs[mi%msgs.length]);
  u.rate=1.3;u.pitch=2.0;u.volume=1;
  synth.speak(u);
  mi++;
  document.getElementById('chip').style.transform='scale(1.3) rotate(10deg)';
  setTimeout(function(){document.getElementById('chip').style.transform='';},400);
}
function makeStars(){
  var c=document.getElementById('stars');
  for(var i=0;i<80;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=Math.random()*3+1;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;--dur:'+(2+Math.random()*4)+'s;animation-delay:'+(Math.random()*4)+'s;';
    c.appendChild(s);
  }
}
function makeFloaters(){
  var fc=document.getElementById('floaters');
  var emojis=['&#x2B50;','&#x1F4A1;','&#x1F308;','&#x1F9E0;','&#x1F4DA;','&#x2728;','&#x1F680;','&#x1F3A8;'];
  for(var i=0;i<10;i++){
    (function(idx){
      var f=document.createElement('div');
      f.className='floater';
      f.innerHTML=emojis[idx%emojis.length];
      var delay=idx*1.8;
      var dur=8+Math.random()*6;
      f.style.cssText='left:'+(5+idx*9)+'%;--fdur:'+dur+'s;animation-delay:'+delay+'s;';
      fc.appendChild(f);
    })(i);
  }
}
makeStars();
makeFloaters();
setTimeout(function(){
  if(synth){
    var u=new SpeechSynthesisUtterance('Welcome to Learning with Chipmunk! Tap the button to start!');
    u.rate=1.2;u.pitch=1.8;u.volume=1;
    synth.speak(u);
  }
},600);
</script>
</body>
</html>
